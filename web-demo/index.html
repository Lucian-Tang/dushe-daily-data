<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>有数Feed — 每日科技快讯 | Luxmind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ========== Reset & Variables ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Shared (theme-independent) */
:root {
  --radius: 12px;
  --radius-sm: 8px;
  --font-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  --nav-height: 64px;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

/* Light theme (default) */
:root, [data-theme="light"] {
  --green: #07c160;
  --green-dim: #05a050;
  --green-glow: rgba(7, 193, 96, 0.15);
  --bg: #FAFAFA;
  --bg-card: #FFFFFF;
  --bg-card-hover: #F8F8F8;
  --border: #E5E5E5;
  --text: #4A4A4A;
  --text-dim: #8A8A8A;
  --text-bright: #1A1A1A;
  --quote-bg: rgba(7, 193, 96, 0.06);
  --quote-border: #07c160;
  --tag-bg: rgba(7, 193, 96, 0.10);
  --tag-text: #07c160;
  --shadow: 0 2px 8px rgba(0,0,0,0.10);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.15);
  --tab-bg: #F5F5F5;
  --backdrop-bg: rgba(250, 250, 250, 0.92);
  --cat-industry: #5B7FBB;
  --cat-dev: #4A90D9;
  --cat-ai: #9B59B6;
  --cat-startup: #E67E22;
  --cat-design: #E74C8C;
  --cat-social: #1ABC9C;
}

/* Dark theme */
[data-theme="dark"] {
  --bg: #0d1117;
  --bg-card: #161b22;
  --bg-card-hover: #1c2330;
  --border: #30363d;
  --text: #c9d1d9;
  --text-dim: #8b949e;
  --text-bright: #f0f6fc;
  --quote-bg: rgba(7, 193, 96, 0.06);
  --quote-border: #07c160;
  --tag-bg: rgba(7, 193, 96, 0.12);
  --tag-text: #07c160;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-hover: 0 2px 8px rgba(0,0,0,0.45);
  --tab-bg: rgba(255,255,255,0.05);
  --backdrop-bg: rgba(13, 17, 23, 0.92);
  --cat-industry: #5B7FBB;
  --cat-dev: #4A90D9;
  --cat-ai: #9B59B6;
  --cat-startup: #E67E22;
  --cat-design: #E74C8C;
  --cat-social: #1ABC9C;
}

/* ========== Base ========== */
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background 0.3s, color 0.3s;
}

a { color: var(--green); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ========== Navigation (Luxmind-style) ========== */
.nav {
  position: fixed;
  z-index: 100;
  height: var(--nav-height);
  background: rgba(13, 17, 23, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 1px 0 var(--border);
  transition: background 0.3s ease, box-shadow 0.3s ease;
}

.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 24px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  color: var(--text-bright);
  text-decoration: none;
  transition: opacity 0.2s;
}
.nav-logo:hover { opacity: 0.8; }
.nav-logo .logo-icon {
  font-size: 20px;
  line-height: 1;
}
.nav-logo .logo-text {
  font-size: 18px;
  letter-spacing: -0.02em;
}
.nav-logo .logo-sub {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 500;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 2px;
}
.nav-links a {
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.2s, background 0.2s;
}
.nav-links a:hover {
  color: var(--text);
  background: rgba(255, 255, 255, 0.05);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-meta {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 0.78rem;
  color: var(--text-dim);
}

.nav-meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.nav-meta-value { color: var(--green); font-weight: 600; font-variant-numeric: tabular-nums; }

/* Theme toggle */
.theme-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  cursor: pointer;
  font-size: 1.1rem;
  transition: all 0.2s;
  line-height: 1;
}
.theme-toggle:hover { transform: scale(1.1); background: rgba(255,255,255,0.1); }
.theme-toggle:active { transform: scale(0.95); }

/* Mobile nav toggle */
.nav-toggle {
  display: none;
  flex-direction: column;
  gap: 4px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
}
.nav-toggle span {
  display: block;
  width: 20px;
  height: 2px;
  background: var(--text-secondary);
  border-radius: 1px;
  transition: all 0.2s;
}

/* ========== Sub Navigation (Tabs + Header meta) ========== */
.subnav {
  position: fixed;
  top: var(--nav-height);
  left: 0;
  z-index: 99;
  background: var(--backdrop-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  transition: background 0.3s, border-color 0.3s;
}

.subnav-inner {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.subnav-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.78rem;
  color: var(--text-dim);
}

/* ========== Tabs ========== */
.tabs {
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  flex: 1;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 8px 16px;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  font-family: var(--font-sans);
}
.tab:hover { color: var(--text); }
.tab.active {
  color: var(--green);
  border-bottom-color: var(--green);
  font-weight: 600;
}

.tab-count {
  display: inline-block;
  margin-left: 4px;
  font-size: 0.7rem;
  padding: 1px 6px;
  border-radius: 10px;
  background: var(--tag-bg);
  color: var(--tag-text);
  font-weight: 500;
  transition: all 0.2s;
}
.tab.active .tab-count {
  background: var(--green);
  color: #fff;
}

/* ========== Main Content ========== */
.main { max-width: 720px; margin: 0 auto; padding: 16px; padding-top: calc(var(--nav-height) + 60px); }

/* ========== Date Section (Collapsible) ========== */
.date-section { margin-bottom: 20px; }

.date-heading {
  font-size: 0.8rem; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s, box-shadow 0.2s;
  margin-bottom: 4px;
}
.date-heading:hover { box-shadow: var(--shadow-hover); }
.date-heading:active { transform: scale(0.995); }

.date-heading::before {
  content: '';
  width: 4px; height: 14px; border-radius: 2px;
  background: var(--green);
}

.date-arrow {
  font-size: 0.7rem;
  transition: transform 0.3s ease;
  opacity: 0.6;
}
.date-heading.expanded .date-arrow {
  transform: rotate(90deg);
}

.date-items {
  overflow: hidden;
  transition: max-height 0.35s ease, opacity 0.25s ease;
  max-height: 5000px;
  opacity: 1;
}
.date-items.collapsed {
  max-height: 0;
  opacity: 0;
}

/* ========== Card ========== */
.card {
  background: var(--bg-card);
  border: none;
  box-shadow: var(--shadow);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 14px;
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
}

.card:hover {
  background: var(--bg-card-hover);
  box-shadow: var(--shadow-hover);
}

.card:active { transform: scale(0.995); }

.card-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 10px; margin-bottom: 8px;
}

.card-title {
  font-size: 0.95rem; font-weight: 600; color: var(--text-bright);
  line-height: 1.4;
  flex: 1;
}

.card-source {
  font-size: 0.7rem; font-weight: 500;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--tag-bg);
  color: var(--tag-text);
  white-space: nowrap;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-body {
  font-size: 0.85rem; color: var(--text);
  line-height: 1.55;
  margin-bottom: 10px;
}

.card-quote {
  font-size: 0.82rem;
  color: var(--green);
  line-height: 1.5;
  padding: 8px 12px;
  background: var(--quote-bg);
  border-left: 3px solid var(--quote-border);
  border-radius: 0 6px 6px 0;
  font-style: italic;
  display: flex; align-items: flex-start; gap: 6px;
}

.quote-icon {
  font-style: normal;
  font-size: 0.9rem;
  opacity: 0.8;
}

.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 10px;
  font-size: 0.72rem; color: var(--text-dim);
}

.card-source-link {
  display: flex; align-items: center; gap: 4px;
  font-size: 0.7rem; color: var(--green);
  font-weight: 500;
  text-decoration: none;
  transition: opacity 0.15s;
}
.card-source-link:hover { opacity: 0.8; text-decoration: underline; }



/* ========== States ========== */
.state-message {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 20px; text-align: center; color: var(--text-dim);
}

.loader {
  width: 28px; height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.state-icon { font-size: 2.5rem; margin-bottom: 12px; }

.state-message .retry-btn {
  margin-top: 16px;
  padding: 8px 20px;
  background: var(--green);
  color: #fff; border: none; border-radius: 20px;
  font-size: 0.85rem; cursor: pointer;
  font-weight: 500;
}
.retry-btn:hover { background: var(--green-dim); }

.empty-state {
  display: flex; flex-direction: column; align-items: center;
  padding: 48px 20px; color: var(--text-dim);
  text-align: center;
}

/* ========== Footer (Luxmind-style) ========== */
.footer {
  text-align: center;
  padding: 48px 32px 40px;
  margin-top: 40px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}

.footer-inner {
  max-width: 720px;
  margin: 0 auto;
}

.footer-brand {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 12px;
}

.footer-brand .brand-icon { font-size: 18px; }

.footer-links {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.footer-links a {
  font-size: 0.82rem;
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.2s;
}

.footer-links a:hover {
  color: var(--green);
}

.footer-copyright {
  font-size: 0.72rem;
  color: var(--text-dim);
  opacity: 0.7;
  line-height: 1.6;
}

.footer-copyright .highlight {
  color: var(--green);
}

.footer-divider {
  height: 2px;
  background: var(--border);
  margin: 12px auto;
  border-radius: 1px;
}

/* ========== Back to Top ========== */
.back-to-top {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(7, 193, 96, 0.75);
  color: #fff;
  border: none;
  font-size: 1.3rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  transition: opacity 0.3s, transform 0.3s, background 0.2s;
  opacity: 0; transform: translateY(20px);
}
.back-to-top.visible {
  opacity: 1; transform: translateY(0);
  pointer-events: auto;
}
.back-to-top:hover { background: var(--green); transform: translateY(-2px) scale(1.05); }
.back-to-top:active { transform: scale(0.95); }

/* ========== Summary Page ========== */
.summary-header {
  text-align: center;
  padding: 20px 0 16px;
  border-bottom: 2px dashed var(--border);
  margin-bottom: 20px;
}
.summary-header h2 {
  font-size: 1.1rem; font-weight: 700; color: var(--text-bright);
  margin-bottom: 4px;
}
.section-divider {
  border: none;
  border-top: 1px dashed var(--border);
  margin: 20px 0 16px;
}
.summary-hot-header {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 12px;
  font-size: 0.88rem; font-weight: 600; color: var(--text-bright);
}

/* Category summary card */
.summary-cat-section {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px 16px;
  margin-bottom: 12px;
  transition: box-shadow 0.2s;
}
.summary-cat-section:hover { box-shadow: var(--shadow-hover); }

.summary-cat-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.summary-cat-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.85rem; font-weight: 600; color: var(--text-bright);
}
.summary-cat-count {
  font-size: 0.72rem; color: var(--text-dim);
  font-weight: 400;
}
.summary-cat-badge {
  font-size: 0.68rem; padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
  text-transform: uppercase;
  color: #fff;
}
.summary-cat-link {
  font-size: 0.75rem; color: var(--green); cursor: pointer;
  font-weight: 500; user-select: none;
  transition: opacity 0.15s;
}
.summary-cat-link:hover { opacity: 0.7; text-decoration: underline; }

/* Compact article in summary */
.card-compact {
  border-top: 1px solid var(--border);
  padding: 9px 0;
  cursor: pointer;
  transition: all 0.15s;
}
.card-compact:first-of-type { border-top: none; }
.card-compact:hover { padding-left: 4px; }

.card-compact-title {
  font-size: 0.82rem; font-weight: 600; color: var(--text-bright);
  line-height: 1.35;
  margin-bottom: 2px;
}
.card-compact-quote {
  font-size: 0.75rem; color: var(--green);
  font-style: italic;
  line-height: 1.4;
  display: flex; align-items: flex-start; gap: 4px;
}

/* ========== Responsive ========== */
@media (max-width: 768px) {
  .nav-inner { padding: 0 20px; }
  .nav-toggle { display: flex; }
  .nav-links.open { display: flex; }
  .nav-links a { padding: 12px 16px; width: 100%; border-radius: 8px; }
  .nav-meta .meta-item-counts { display: none; }
  .back-to-top { bottom: 16px; right: 16px; width: 38px; height: 38px; font-size: 1.1rem; }
  .subnav { padding: 6px 12px; }
  .subnav-meta { display: none; }
    content: '';
  }
  .main { padding: 12px; padding-top: calc(var(--nav-height) + 50px); }
  .card { padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 0.9rem; }
  .card-body { font-size: 0.82rem; }
  .card-quote { font-size: 0.78rem; }
  .tab { padding: 6px 12px; font-size: 0.8rem; }
  .date-heading { padding: 8px 10px; font-size: 0.75rem; }
  .summary-header { padding: 14px 0 12px; }
  .summary-header h2 { font-size: 1rem; }
  .summary-cat-section { padding: 12px; }
  .footer { padding: 32px 20px 28px; }
}

@media (max-width: 480px) {
  .nav-inner { padding: 0 16px; }
  .nav-links a { padding: 10px 14px; font-size: 13px; }
  .main { padding: 10px; padding-top: calc(var(--nav-height) + 46px); }
  .tab { padding: 6px 10px; font-size: 0.78rem; }
  .subnav { padding: 4px 10px; }
  .subnav-meta { display: none; }
  .footer { padding: 28px 16px 24px; }
  .footer-links { gap: 14px; }
}

/* ========== Ranking Card (GitHub/ClawHub) ========== */
.ranking-card {
  display: flex;
  gap: 12px;
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.ranking-card:hover { box-shadow: var(--shadow-hover); background: var(--bg-card-hover); }
.ranking-card:active { transform: scale(0.995); }

.ranking-number {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  font-size: 1rem; font-weight: 700;
  color: #fff;
}
.ranking-number.rn { background: var(--tab-bg); color: var(--text-dim); }

.ranking-body { flex: 1; min-width: 0; }
.ranking-title { font-size: 0.9rem; font-weight: 600; color: var(--text-bright); line-height: 1.3; }
.ranking-desc { font-size: 0.78rem; color: var(--text); line-height: 1.4; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.ranking-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 0.72rem; flex-wrap: wrap; }
.ranking-meta .lang-tag {
  background: var(--tag-bg); color: var(--tag-text);
  padding: 1px 7px; border-radius: 4px; font-weight: 500;
}
.ranking-meta .star-count { color: #F0A500; font-weight: 600; }
.ranking-meta .star-today { color: #E74C3C; font-weight: 600; }
.ranking-meta .fork-count { color: var(--text-dim); }

/* Ranking card compact (ClawHub) */
.ranking-card-compact .ranking-body { display: flex; align-items: center; gap: 12px; }
.ranking-quote {
  font-size: 0.75rem; color: var(--green);
  font-style: italic; line-height: 1.3;
  margin-top: 2px;
}

/* View toggle */
.view-toggle {
  display: flex; gap: 4px;
  background: var(--tab-bg);
  border-radius: 8px;
  padding: 2px;
}
.view-toggle-btn {
  padding: 4px 12px;
  font-size: 0.75rem; font-weight: 500;
  border: none; border-radius: 6px;
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.15s;
}
.view-toggle-btn.active { background: var(--bg-card); color: var(--green); box-shadow: var(--shadow); }
.view-toggle-btn:hover { color: var(--text); }

/* ========== Vendor Card (AI Models) ========== */
.vendor-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 10px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.vendor-card:hover { box-shadow: var(--shadow-hover); }

.vendor-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.vendor-header:hover { background: var(--bg-card-hover); }

.vendor-label {
  display: flex; align-items: center; gap: 8px;
  font-weight: 600; color: var(--text-bright);
}
.vendor-label .vendor-icon { font-size: 1.2rem; }
.vendor-label .vendor-name { font-size: 0.9rem; }
.vendor-count {
  font-size: 0.72rem; color: var(--text-dim);
  margin-left: 6px; font-weight: 400;
}

.vendor-arrow {
  font-size: 0.7rem;
  transition: transform 0.3s ease;
  opacity: 0.5;
}
.vendor-header.expanded .vendor-arrow { transform: rotate(90deg); }

.vendor-items {
  overflow: hidden;
  transition: max-height 0.35s ease, opacity 0.25s ease;
  max-height: 2000px;
  opacity: 1;
  border-top: 1px solid var(--border);
}
.vendor-items.collapsed { max-height: 0; opacity: 0; border-top: none; }

.vendor-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.vendor-item:first-child { border-top: none; }
.vendor-item:hover { background: var(--bg-card-hover); }
.vendor-item:active { transform: scale(0.995); }

.vendor-item-num {
  width: 22px; text-align: center;
  font-size: 0.72rem; color: var(--text-dim);
  font-weight: 600; margin-top: 1px;
}
.vendor-item-body { flex: 1; min-width: 0; }
.vendor-item-title { font-size: 0.85rem; font-weight: 600; color: var(--text-bright); line-height: 1.35; }
.vendor-item-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.vendor-item-tag {
  font-size: 0.68rem; padding: 1px 6px;
  border-radius: 4px;
  background: var(--tag-bg);
  color: var(--tag-text);
}
.vendor-item-quote {
  font-size: 0.75rem; color: var(--green);
  font-style: italic; line-height: 1.3;
  margin-top: 3px;
}

/* ========== Matrix View ========== */
.matrix-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 0.72rem;
  background: var(--bg-card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.matrix-table th, .matrix-table td {
  padding: 6px 8px;
  text-align: center;
  border: 1px solid var(--border);
}
.matrix-table th {
  background: var(--bg-card-hover);
  font-weight: 600;
  color: var(--text-bright);
  font-size: 0.7rem;
}
.matrix-table .cell-active {
  background: rgba(7, 193, 96, 0.08);
  color: var(--green);
  font-weight: 600;
}
.matrix-table .cell-empty { color: var(--text-dim); opacity: 0.4; }

/* ========== Weekly Summary Card ========== */
.weekly-summary {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px 18px;
  margin-bottom: 14px;
}
.weekly-summary h3 {
  font-size: 0.9rem; font-weight: 700; color: var(--text-bright);
  margin-bottom: 8px;
}
.weekly-summary p {
  font-size: 0.8rem; color: var(--text);
  line-height: 1.5;
  margin-bottom: 6px;
}
.weekly-stats {
  display: flex; gap: 16px; flex-wrap: wrap;
  font-size: 0.75rem; color: var(--text-dim);
}
.weekly-highlight {
  padding: 8px 0;
  border-top: 1px solid var(--border);
  font-size: 0.78rem;
  cursor: pointer;
}
.weekly-highlight:first-of-type { border-top: none; }
.weekly-highlight:hover { padding-left: 4px; }
</style>
</head>

<script>
/* ========== Constants ========== */
const CDN_BASE = '';
const CATEGORIES = ['industry', 'dev', 'ai', 'startup', 'design', 'github', 'clawhub', 'ai_models'];
const CAT_LABELS = { industry: '行业', dev: '开发', ai: 'AI', startup: '创业', design: '设计', github: '开源', clawhub: '技能', ai_models: '模型' };
const CAT_ICONS = { industry: '🏭', dev: '💻', ai: '🤖', startup: '🚀', design: '🎨', github: '💻', clawhub: '🔌', ai_models: '🤖' };

let allData = {};
let currentTab = 'summary';

/* ========== DOM ========== */
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

/* ========== Theme ========== */
function getTheme() {
  return localStorage.getItem('dushe-theme') || 'light';
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const icon = $('#themeIcon');
  if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('dushe-theme', theme);
}

function toggleTheme() {
  const current = getTheme();
  const next = current === 'dark' ? 'light' : 'dark';
  applyTheme(next);
}

// Apply on load
applyTheme(getTheme());

/* ========== Data Fetching ========== */
async function fetchJSON(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00+08:00');
  if (isNaN(d.getTime())) return dateStr;
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

/**
 * Load data per-section from individual daily files via index.json.
 * Each section gets today's file + up to 2 previous days from history.
 */
async function loadSectionData(section, todayFile, historyFiles) {
  const filesToFetch = [todayFile];
  // Add latest 2 history files (yesterday, day before)
  if (historyFiles && historyFiles.length) {
    for (const f of historyFiles.slice(0, 2)) {
      if (f !== todayFile) filesToFetch.push(f);
    }
  }
  let allItems = [];
  for (const file of filesToFetch) {
    try {
      const items = await fetchJSON(`${CDN_BASE}/${file}`);
      if (Array.isArray(items)) allItems = allItems.concat(items);
    } catch { /* skip unavailable */ }
  }
  return allItems;
}

async function loadData() {
  // Step 1: Fetch index.json
  const indexData = await fetchJSON(`${CDN_BASE}/index.json`);

  // Update timestamp
  if (indexData.updated) {
    const d = new Date(indexData.updated);
    if (!isNaN(d.getTime())) {
      $('#updateTime').textContent =
        `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
  }

  // Step 2: Load each section from individual daily files (today + history)
  const history = indexData.history || {};
  const result = {};

  // Legacy sections
  const legacyCats = ['industry', 'dev', 'ai', 'startup', 'design'];
  const tasks = legacyCats.map(async (section) => {
    const todayFile = indexData[section];
    const historyFiles = history[section] || [];
    result[section] = await loadSectionData(section, todayFile, historyFiles);
  });

  // New sections (github, clawhub, ai_models) — only today's file
  const newSections = ['github', 'clawhub', 'ai_models'];
  for (const section of newSections) {
    const todayFile = indexData[section];
    if (todayFile) {
      tasks.push((async () => {
        try {
          result[section] = await fetchJSON(`${CDN_BASE}/${todayFile}`);
        } catch { result[section] = []; }
      })());
    } else {
      result[section] = [];
    }
  }
  // Also fetch weekly files for the view toggles
  tasks.push((async () => {
    try {
      result._weekly_github = indexData.weekly_github
        ? await fetchJSON(`${CDN_BASE}/${indexData.weekly_github}`) : null;
    } catch { result._weekly_github = null; }
  })());
  tasks.push((async () => {
    try {
      result._weekly_clawhub = indexData.weekly_clawhub
        ? await fetchJSON(`${CDN_BASE}/${indexData.weekly_clawhub}`) : null;
    } catch { result._weekly_clawhub = null; }
  })());
  tasks.push((async () => {
    try {
      result._ai_models_weekly = indexData.ai_models_weekly
        ? await fetchJSON(`${CDN_BASE}/${indexData.ai_models_weekly}`) : null;
    } catch { result._ai_models_weekly = null; }
  })());

  await Promise.all(tasks);
  return result;
}

/* ========== Date Grouping ========== */
function getDateLabel(published) {
  if (!published) return '更早';
  const now = new Date();
  const pub = new Date(published + 'T00:00:00+08:00');
  if (isNaN(pub.getTime())) return '更早';

  const nowStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const pubStart = new Date(pub.getFullYear(), pub.getMonth(), pub.getDate());
  const diffDays = Math.round((nowStart - pubStart) / (1000 * 60 * 60 * 24));

  if (diffDays === 0) return '今天';
  if (diffDays === 1) return '昨天';
  return formatDate(published) || '更早';
}

function groupByDate(items) {
  const groups = {};
  for (const item of items) {
    const label = getDateLabel(item.published);
    if (!groups[label]) groups[label] = [];
    groups[label].push(item);
  }
  // Sort: 今天, 昨天, then chronological descending
  const order = ['今天', '昨天'];
  const sortedKeys = Object.keys(groups).sort((a, b) => {
    const ai = order.indexOf(a), bi = order.indexOf(b);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return 1;
    return b.localeCompare(a);
  });
  return sortedKeys.map(k => ({ label: k, items: groups[k] }));
}

/* ========== Rendering (List) ========== */
function renderCard(item) {
  const source = item.source || '未知';
  const title = item.title || '无标题';
  const content = item.content || '';
  const quote = item.quote || '';
  const url = item.url || '';
  const hasUrl = url && url !== '#';
  const escUrl = url.replace(/"/g, '&quot;');

  return `
    <article class="card" data-url="${escUrl}" onclick="var u=this.dataset.url;if(u)window.open(u,'_blank','noopener')">
      <div class="card-header">
        <div class="card-title">${escHtml(title)}</div>
        <span class="card-source">${escHtml(source)}</span>
      </div>
      ${content ? `<div class="card-body">${escHtml(content)}</div>` : ''}
      ${quote ? `
      <div class="card-quote">
        <span class="quote-icon">💬</span>
        <span>${escHtml(quote)}</span>
      </div>` : ''}
      <div class="card-footer">
        <span>${item.published ? formatDate(item.published) : ''}</span>
        ${hasUrl ? `<a class="card-source-link" href="${escUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">查看原文 →</a>` : '<span class="card-source-link" style="color:var(--text-dim)">暂无链接</span>'}
      </div>
    </article>
  `;
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderTab(tabKey) {
  if (tabKey === 'github') { renderGithubTab(); return; }
  if (tabKey === 'clawhub') { renderClawhubTab(); return; }
  if (tabKey === 'ai_models') { renderAiModelsTab(); return; }

  const items = allData[tabKey] || [];
  const groups = groupByDate(items);
  const container = $('main#mainContent');

  if (items.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="state-icon">📭</div>
        <div>${CAT_LABELS[tabKey]} 板块暂无数据</div>
      </div>`;
    return;
  }

  let html = '';
  let groupIndex = 0;
  for (const group of groups) {
    // First group (今天) is expanded by default
    const isExpanded = groupIndex === 0;
    const sectionId = `section-${tabKey}-${groupIndex}`;
    html += `<section class="date-section" id="${sectionId}">`;
    html += `<div class="date-heading${isExpanded ? ' expanded' : ''}" onclick="toggleDateSection('${sectionId}')">
      ${CAT_ICONS[tabKey]} ${group.label} · ${group.items.length} 条
      <span class="date-arrow">▶</span>
    </div>`;
    html += `<div class="date-items${isExpanded ? '' : ' collapsed'}" id="${sectionId}-items">`;
    for (const item of group.items) {
      html += renderCard(item);
    }
    html += `</div>`;
    html += `</section>`;
    groupIndex++;
  }
  container.innerHTML = html;
}

/* ========== New Tab: GitHub (排行榜卡片) ========== */
let githubView = 'daily'; // 'daily' | 'rising' | 'weekly'

function renderGithubTab() {
  const container = $('main#mainContent');
  const items = (allData['github'] || []);
  const weekly = allData._weekly_github;

  let html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  html += '<div style="font-size:0.88rem;font-weight:600;color:var(--text-bright)">💻 开源 · GitHub Trending</div>';
  html += '<div class="view-toggle">';
  html += `<button class="view-toggle-btn ${githubView==='daily'?'active':''}" onclick="githubView='daily';renderGithubTab();">📅 日榜</button>`;
  html += `<button class="view-toggle-btn ${githubView==='rising'?'active':''}" onclick="githubView='rising';renderGithubTab();">🔥 上升</button>`;
  if (weekly) {
    html += `<button class="view-toggle-btn ${githubView==='weekly'?'active':''}" onclick="githubView='weekly';renderGithubTab();">📊 周报</button>`;
  }
  html += '</div></div>';

  if (githubView === 'weekly' && weekly) {
    html += renderGithubWeekly(weekly);
  } else if (githubView === 'rising') {
    // 按今日新增 star 数降序排列（成长最快的项目）
    const rising = [...items].sort((a, b) => (b.stars_today || 0) - (a.stars_today || 0));
    const top10 = rising.slice(0, 10);
    html += '<div style="font-size:0.82rem;color:var(--text-dim);margin-bottom:8px">🔥 按今日新增 star 排序 — 发现增长最快的开源项目</div>';
    for (let i = 0; i < top10.length; i++) {
      html += renderRankingCard(top10[i], i + 1);
    }
  } else if (items.length === 0) {
    html += '<div class="empty-state"><div class="state-icon">📭</div><div>暂无 GitHub Trending 数据</div></div>';
  } else {
    const top10 = items.slice(0, 10);
    for (let i = 0; i < top10.length; i++) {
      html += renderRankingCard(top10[i], i + 1);
    }
  }
  container.innerHTML = html;
}

function renderRankingCard(item, rank) {
  const rankClass = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : 'rn';
  const lang = item.language || '';
  const stars = item.stars || 0;
  const starsToday = item.stars_today || 0;
  const forks = item.forks || 0;
  const url = item.url || '#';
  const escUrl = url.replace(/"/g, '&quot;');

  let starsStr = '';
  if (stars >= 1000) starsStr = `⭐${(stars / 1000).toFixed(1)}k`;
  else if (stars > 0) starsStr = `⭐${stars}`;

  let todayStr = starsToday > 0 ? `🔥+${starsToday.toLocaleString()}` : '';
  let forkStr = forks > 0 ? `⑂ ${forks}` : '';

  return `
    <article class="ranking-card" data-url="${escUrl}" onclick="var u=this.dataset.url;if(u)window.open(u,'_blank','noopener')">
      <div class="ranking-number ${rankClass}">${rank}</div>
      <div class="ranking-body">
        <div class="ranking-title">${escHtml(item.title || 'No Name')}</div>
        ${item.content ? `<div class="ranking-desc">${escHtml(item.content)}</div>` : ''}
        <div class="ranking-meta">
          ${lang ? `<span class="lang-tag">${escHtml(lang)}</span>` : ''}
          ${starsStr ? `<span class="star-count">${starsStr}</span>` : ''}
          ${todayStr ? `<span class="star-today">${todayStr}</span>` : ''}
          ${forkStr ? `<span class="fork-count">${forkStr}</span>` : ''}
        </div>
        ${item.quote ? `<div class="ranking-quote">💬 ${escHtml(item.quote)}</div>` : ''}
      </div>
    </article>
  `;
}

function renderGithubWeekly(weekly) {
  let html = '';
  const stats = weekly.stats || {};
  html += `<div class="weekly-summary"><h3>📊 本周 GitHub 周报</h3>`;
  html += `<p>${escHtml(weekly.summary || '')}</p>`;
  html += `<div class="weekly-stats">`;
  html += `<span>📦 总项目: ${stats.total_repos || 0}</span>`;
  html += `<span>🆕 新上榜: ${stats.new_entries || 0}</span>`;
  html += `<span>🔥 持续热门: ${stats.persistent || 0}</span>`;
  // Language distribution
  const langs = stats.languages || {};
  const langTags = Object.entries(langs).slice(0, 5).map(([l, c]) => `${l}(${c})`).join(' · ');
  if (langTags) html += `<span>🛠 ${langTags}</span>`;
  html += `</div></div>`;

  // Weekly highlights
  if (weekly.highlights && weekly.highlights.length) {
    html += '<div style="font-size:0.82rem;font-weight:600;color:var(--text-bright);margin-bottom:8px">🌟 本周亮点</div>';
    for (const h of weekly.highlights) {
      const url = h.url || '#';
      html += `<div class="weekly-highlight" onclick="window.open('${url.replace(/'/g, "\\'")}','_blank','noopener')">`;
      html += `<div style="font-weight:600">${escHtml(h.title || '')}</div>`;
      if (h.reason) html += `<div style="font-size:0.72rem;color:var(--green);margin-top:2px">💡 ${escHtml(h.reason)}</div>`;
      html += `</div>`;
    }
  }

  if (weekly.top_10 && weekly.top_10.length) {
    html += '<div style="font-size:0.82rem;font-weight:600;color:var(--text-bright);margin-bottom:8px;margin-top:12px">🏆 本周 Top 10</div>';
    for (let i = 0; i < weekly.top_10.length; i++) {
      const item = weekly.top_10[i];
      html += renderRankingCard({
        title: item.title, content: item.content, language: item.language,
        stars: item.stars, forks: item.forks, url: item.url, quote: '',
      }, i + 1);
    }
  }
  return html;
}

/* ========== New Tab: ClawHub (排行榜卡片) ========== */
let clawhubView = 'daily';

function renderClawhubTab() {
  const container = $('main#mainContent');
  const items = (allData['clawhub'] || []);
  const weekly = allData._weekly_clawhub;

  let html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  html += '<div style="font-size:0.88rem;font-weight:600;color:var(--text-bright)">🔌 技能 · ClawHub</div>';
  html += '<div class="view-toggle">';
  html += `<button class="view-toggle-btn ${clawhubView==='daily'?'active':''}" onclick="clawhubView='daily';renderClawhubTab();">📅 日榜</button>`;
  html += `<button class="view-toggle-btn ${clawhubView==='rising'?'active':''}" onclick="clawhubView='rising';renderClawhubTab();">🔥 上升</button>`;
  if (weekly) {
    html += `<button class="view-toggle-btn ${clawhubView==='weekly'?'active':''}" onclick="clawhubView='weekly';renderClawhubTab();">📊 周报</button>`;
  }
  html += '</div></div>';

  if (clawhubView === 'weekly' && weekly) {
    html += renderClawhubWeekly(weekly);
  } else if (clawhubView === 'rising') {
    // 按下载量降序排列（含 momentum：下载量 × star 综合分）
    const rising = [...items].sort((a, b) => {
      const scoreA = (a.downloads || 0) * (a.stars_val || 1);
      const scoreB = (b.downloads || 0) * (b.stars_val || 1);
      return scoreB - scoreA;
    });
    const top10 = rising.slice(0, 10);
    html += '<div style="font-size:0.82rem;color:var(--text-dim);margin-bottom:8px">🔥 按综合热度（下载 × 收藏）排序 — 发现最受欢迎的技能</div>';
    for (let i = 0; i < top10.length; i++) {
      html += renderClawhubCard(top10[i], i + 1);
    }
  } else if (items.length === 0) {
    html += '<div class="empty-state"><div class="state-icon">📭</div><div>暂无 ClawHub 数据</div></div>';
  } else {
    // ClawHub items are arrays (from daily JSON), render top 10
    const list = Array.isArray(items) ? items.slice(0, 10) : [];
    for (let i = 0; i < list.length; i++) {
      html += renderClawhubCard(list[i], i + 1);
    }
  }
  container.innerHTML = html;
}

function renderClawhubCard(item, rank) {
  const rankClass = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : 'rn';
  const url = item.url || '#';
  const escUrl = url.replace(/"/g, '&quot;');
  const downloads = item.downloads || 0;
  const starsVal = item.stars_val || 0;
  const version = item.version || '';

  let statParts = [];
  if (downloads > 0) statParts.push(`📥 ${downloads.toLocaleString()} 下载`);
  if (starsVal > 0) statParts.push(`⭐ ${starsVal}`);
  if (version) statParts.push(`v${version}`);

  return `
    <article class="ranking-card" data-url="${escUrl}" onclick="var u=this.dataset.url;if(u)window.open(u,'_blank','noopener')">
      <div class="ranking-number ${rankClass}">${rank}</div>
      <div class="ranking-body">
        <div class="ranking-title">${escHtml(item.title || 'No Name')}</div>
        ${item.content ? `<div class="ranking-desc">${escHtml(item.content)}</div>` : ''}
        <div class="ranking-meta">
          ${statParts.map(s => `<span>${s}</span>`).join('')}
        </div>
        ${item.quote ? `<div class="ranking-quote">💬 ${escHtml(item.quote)}</div>` : ''}
      </div>
    </article>
  `;
}

function renderClawhubWeekly(weekly) {
  let html = '';
  const stats = weekly.stats || {};
  html += `<div class="weekly-summary"><h3>📊 本周 ClawHub 周报</h3>`;
  html += `<p>${escHtml(weekly.summary || '')}</p>`;
  html += `<div class="weekly-stats">`;
  html += `<span>📦 总技能: ${stats.total_skills || 0}</span>`;
  html += `<span>🆕 新上榜: ${stats.new_entries || 0}</span>`;
  html += `<span>📥 总下载: ${(stats.total_downloads || 0).toLocaleString()}</span>`;
  // Category distribution
  const cats = stats.categories || {};
  const catTags = Object.entries(cats).slice(0, 4).map(([c, n]) => `${c}(${n})`).join(' · ');
  if (catTags) html += `<span>📂 ${catTags}</span>`;
  html += `</div></div>`;

  // Weekly highlights
  if (weekly.highlights && weekly.highlights.length) {
    html += '<div style="font-size:0.82rem;font-weight:600;color:var(--text-bright);margin-bottom:8px">🌟 本周亮点</div>';
    for (const h of weekly.highlights) {
      const url = h.url || '#';
      html += `<div class="weekly-highlight" onclick="window.open('${url.replace(/'/g, "\\'")}','_blank','noopener')">`;
      html += `<div style="font-weight:600">${escHtml(h.title || '')}</div>`;
      if (h.reason) html += `<div style="font-size:0.72rem;color:var(--green);margin-top:2px">💡 ${escHtml(h.reason)}</div>`;
      html += `</div>`;
    }
  }

  if (weekly.top_10 && weekly.top_10.length) {
    html += '<div style="font-size:0.82rem;font-weight:600;color:var(--text-bright);margin-bottom:8px;margin-top:12px">🏆 本周 Top 10</div>';
    for (let i = 0; i < weekly.top_10.length; i++) {
      html += renderClawhubCard(Object.assign({}, weekly.top_10[i], { url: weekly.top_10[i].url, content: weekly.top_10[i].content, downloads: weekly.top_10[i].downloads, stars_val: weekly.top_10[i].stars, quote: '' }), i + 1);
    }
  }

  // Fastest growing section
  if (weekly.fastest_growing && weekly.fastest_growing.length) {
    html += '<div style="font-size:0.82rem;font-weight:600;color:var(--text-bright);margin-bottom:8px;margin-top:12px">📈 增速最快</div>';
    for (const g of weekly.fastest_growing) {
      const url = g.url || '#';
      html += `<div class="weekly-highlight" onclick="window.open('${url.replace(/'/g, "\\'")}','_blank','noopener')">`;
      html += `<div style="font-weight:600">${escHtml(g.title || '')} <span style="color:var(--green);font-size:0.72rem">+${g.growth || 0}</span></div>`;
      if (g.reason) html += `<div style="font-size:0.72rem;color:var(--text-dim);margin-top:2px">💡 ${escHtml(g.reason)}</div>`;
      html += `</div>`;
    }
  }
  return html;
}

/* ========== New Tab: AI Models (Vendor Cards) ========== */
let aiModelsView = 'daily'; // 'daily' | 'weekly' | 'matrix'

function renderAiModelsTab() {
  const container = $('main#mainContent');

  // allData['ai_models'] could be a wrapped object {date, models:{...}, total}
  // or a plain array (from the daily JSON)
  let modelsData = allData['ai_models'] || {};
  const weekly = allData._ai_models_weekly;
  let modelGroups;

  // Normalize: if it's an array, skip; if it has .models, unwrap
  if (Array.isArray(modelsData)) {
    modelGroups = {};
  } else if (modelsData && modelsData.models) {
    modelGroups = modelsData.models || {};
  } else {
    modelGroups = modelsData || {};
  }

  let html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  html += '<div style="font-size:0.88rem;font-weight:600;color:var(--text-bright)">🤖 AI模型动态</div>';
  html += '<div class="view-toggle">';
  html += `<button class="view-toggle-btn ${aiModelsView==='daily'?'active':''}" onclick="aiModelsView='daily';renderAiModelsTab();">📅 日报</button>`;
  html += `<button class="view-toggle-btn ${aiModelsView==='matrix'?'active':''}" onclick="aiModelsView='matrix';renderAiModelsTab();">📋 矩阵</button>`;
  if (weekly) {
    html += `<button class="view-toggle-btn ${aiModelsView==='weekly'?'active':''}" onclick="aiModelsView='weekly';renderAiModelsTab();">📊 周报</button>`;
  }
  html += '</div></div>';

  if (aiModelsView === 'weekly' && weekly) {
    html += renderAiModelsWeekly(weekly);
  } else if (aiModelsView === 'matrix') {
    html += renderAiModelsMatrix(modelGroups);
  } else {
    // Daily card view — by vendor
    const vendorKeys = Object.keys(modelGroups);
    if (vendorKeys.length === 0) {
      html += '<div class="empty-state"><div class="state-icon">📭</div><div>暂无AI模型动态数据</div></div>';
    } else {
      for (let i = 0; i < vendorKeys.length; i++) {
        const vk = vendorKeys[i];
        const vdata = modelGroups[vk];
        html += renderVendorCard(vk, vdata, i === 0);
      }
    }
  }
  container.innerHTML = html;
}

function renderVendorCard(vendorKey, vdata, expanded) {
  const displayName = vdata.displayName || vendorKey;
  const icon = vdata.icon || '📰';
  const items = vdata.items || [];
  const cardId = `vendor-${vendorKey}`;

  let html = `<div class="vendor-card" id="${cardId}">`;
  html += `<div class="vendor-header ${expanded ? 'expanded' : ''}" onclick="toggleVendorCard('${cardId}')">`;
  html += `<div class="vendor-label"><span class="vendor-icon">${icon}</span><span class="vendor-name">${escHtml(displayName)}</span>`;
  html += `<span class="vendor-count">今日 +${items.length} 条</span></div>`;
  html += `<span class="vendor-arrow">▶</span>`;
  html += `</div>`;

  html += `<div class="vendor-items ${expanded ? '' : 'collapsed'}" id="${cardId}-items">`;
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const url = item.url || '#';
    const escUrl = url.replace(/"/g, '&quot;');
    html += `<div class="vendor-item" data-url="${escUrl}" onclick="var u=this.dataset.url;if(u)window.open(u,'_blank','noopener')">`;
    html += `<div class="vendor-item-num">${i + 1}.</div>`;
    html += `<div class="vendor-item-body">`;
    html += `<div class="vendor-item-title">${escHtml(item.title || '')}</div>`;
    html += `<div class="vendor-item-tags">`;
    if (item.direction) html += `<span class="vendor-item-tag">🏷️ ${escHtml(item.direction)}</span>`;
    if (item.source) html += `<span class="vendor-item-tag">📰 ${escHtml(item.source)}</span>`;
    html += `</div>`;
    if (item.quote) html += `<div class="vendor-item-quote">💬 ${escHtml(item.quote)}</div>`;
    html += `</div></div>`;
  }
  html += `</div></div>`;
  return html;
}

function toggleVendorCard(cardId) {
  const heading = document.querySelector(`#${cardId} .vendor-header`);
  const items = document.getElementById(`${cardId}-items`);
  if (!heading || !items) return;

  const isCollapsed = items.classList.contains('collapsed');

  if (isCollapsed) {
    heading.classList.add('expanded');
    items.classList.remove('collapsed');
  } else {
    heading.classList.remove('expanded');
    items.classList.add('collapsed');
  }
}

function renderAiModelsMatrix(modelGroups) {
  // Build matrix: rows=vendors, cols=directions
  const vendorKeys = Object.keys(modelGroups);
  if (vendorKeys.length === 0) {
    return '<div class="empty-state"><div class="state-icon">📭</div><div>暂无数据</div></div>';
  }

  const directions = ['模型发布', '工具/平台', '研究/论文', '应用/落地', '政策/合规', '行业动态'];

  let html = '<div style="overflow-x:auto"><table class="matrix-table"><thead><tr><th>厂商</th>';
  for (const dir of directions) {
    html += `<th>${dir}</th>`;
  }
  html += '<th>合计</th></tr></thead><tbody>';

  for (const vk of vendorKeys) {
    const vdata = modelGroups[vk];
    const items = vdata.items || [];
    const displayName = vdata.displayName || vk;
    const icon = vdata.icon || '📰';

    html += `<tr><td style="text-align:left;font-weight:600;white-space:nowrap">${icon} ${escHtml(displayName)}</td>`;

    for (const dir of directions) {
      const count = items.filter(it => it.direction === dir).length;
      if (count > 0) {
        html += `<td class="cell-active">${count}</td>`;
      } else {
        html += `<td class="cell-empty">-</td>`;
      }
    }
    html += `<td style="font-weight:600;color:var(--green)">${items.length}</td></tr>`;
  }

  html += '</tbody></table></div>';
  return html;
}

function renderAiModelsWeekly(weekly) {
  let html = '';
  const stats = weekly.stats || {};
  html += `<div class="weekly-summary"><h3>📊 本周 AI 模型周报</h3>`;
  html += `<p>${escHtml(weekly.summary || '')}</p>`;
  html += `<div class="weekly-stats">`;
  html += `<span>📦 总动态: ${stats.total_items || 0}</span>`;
  const byVendor = stats.by_vendor || {};
  const topVendor = Object.entries(byVendor).sort((a,b) => b[1] - a[1]).slice(0,3)
    .map(([k,v]) => `${k}(${v})`).join(', ');
  html += `<span>最活跃: ${topVendor || 'N/A'}</span>`;
  html += `</div></div>`;

  // Weekly highlights
  if (weekly.highlights && weekly.highlights.length) {
    html += '<div style="font-size:0.82rem;font-weight:600;color:var(--text-bright);margin-bottom:8px">🌟 本周亮点</div>';
    for (const item of weekly.highlights) {
      const url = item.url || '#';
      html += `<div class="weekly-highlight" onclick="window.open('${url.replace(/'/g, "\\'")}','_blank','noopener')">`;
      html += `<div style="font-weight:600">${escHtml(item.title || '')}</div>`;
      if (item.quote) html += `<div style="font-size:0.75rem;color:var(--green);font-style:italic;margin-top:2px">💬 ${escHtml(item.quote)}</div>`;
      html += `</div>`;
    }
  }
  return html;
}

/* ========== Date Section Collapse ========== */
function toggleDateSection(sectionId) {
  const heading = document.querySelector(`#${sectionId} .date-heading`);
  const items = document.getElementById(`${sectionId}-items`);
  if (!heading || !items) return;

  const isCollapsed = items.classList.contains('collapsed');

  if (isCollapsed) {
    // Expand
    heading.classList.add('expanded');
    items.classList.remove('collapsed');
  } else {
    // Collapse
    heading.classList.remove('expanded');
    items.classList.add('collapsed');
  }
}

/* ========== Tab Switching ========== */
function switchTab(tabKey) {
  currentTab = tabKey;
  $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabKey));
  if (tabKey === 'summary') {
    renderSummary();
  } else {
    renderTab(tabKey);
  }
}


function updateTabCounts() {
  let total = 0;
  for (const cat of CATEGORIES) {
    let items = allData[cat] || [];
    let count = 0;
    if (cat === 'ai_models' && !Array.isArray(items) && items.models) {
      for (const vk of Object.keys(items.models || {})) {
        count += (items.models[vk].items || []).length;
      }
    } else if (Array.isArray(items)) {
      count = items.length;
    }
    total += count;
    const el = $(`#count-${cat}`);
    if (el) el.textContent = count;
  }
  const summaryEl = $('#count-summary');
  if (summaryEl) summaryEl.textContent = total;
  const totalEl = $('#totalCount');
  if (totalEl) totalEl.textContent = total;
}

/* ========== Quote Quality Scoring ========== */
function getQuoteScore(item) {
  const q = (item.quote || '').trim();
  if (!q) return -1;
  return q.length;
}

/* ========== Summary Rendering ========== */
function renderSummary() {
  const container = $('main#mainContent');

  // Collect all items across categories (including new ones)
  let allItems = [];
  for (const cat of CATEGORIES) {
    let items = allData[cat] || [];
    // For ai_models, flatten vendor items
    if (cat === 'ai_models' && !Array.isArray(items) && items.models) {
      const flat = [];
      for (const vk of Object.keys(items.models || {})) {
        const vdata = items.models[vk];
        for (const it of (vdata.items || [])) {
          flat.push({ ...it, _cat: cat });
        }
      }
      items = flat;
    }
    // Ensure items is an array
    if (!Array.isArray(items)) items = [];

    for (const item of items) {
      allItems.push({ ...item, _cat: cat });
    }
  }

  if (allItems.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="state-icon">📭</div><div>暂无数据</div></div>`;
    return;
  }

  // Sort for "今日最热": quote length > 10 first (by length desc), then 1-10, then no quote
  const scored = allItems.map(item => ({ item, score: getQuoteScore(item) }));
  scored.sort((a, b) => {
    const aLong = a.score > 10, bLong = b.score > 10;
    if (aLong && !bLong) return -1;
    if (!aLong && bLong) return 1;
    return b.score - a.score;
  });
  const hotItems = scored.slice(0, 6).map(s => s.item);

  let html = '';

  // Header
  html += `<div class="summary-header">
    <h2>📋 今日汇总 · 共 ${allItems.length} 条精选</h2>
  </div>`;

  // 🔥 今日最热
  html += `<div class="summary-hot-header">🔥 今日最热 · 全局精选 Top ${hotItems.length}</div>`;
  for (const item of hotItems) {
    html += renderCard(item);
  }

  // Divider
  html += `<hr class="section-divider">`;

  // Per-category summary
  for (const cat of CATEGORIES) {
    let items = allData[cat] || [];
    // Flatten ai_models dict for per-category display
    if (cat === 'ai_models' && !Array.isArray(items) && items.models) {
      const flat = [];
      for (const vk of Object.keys(items.models || {})) {
        for (const it of (items.models[vk].items || [])) {
          flat.push(it);
        }
      }
      items = flat;
    } else if (!Array.isArray(items)) {
      items = [];
    }
    const count = items.length;
    const top2 = items.slice(0, 2);

    html += `<div class="summary-cat-section">
      <div class="summary-cat-header">
        <div class="summary-cat-label">
          <span class="summary-cat-badge" style="background:var(--cat-${cat})">${CAT_LABELS[cat]}</span>
          <span>${CAT_ICONS[cat]} ${CAT_LABELS[cat]}</span>
          <span class="summary-cat-count">· ${count} 条</span>
        </div>
        <span class="summary-cat-link" onclick="switchTab('${cat}')">查看全部 →</span>
      </div>`;

    if (top2.length === 0) {
      html += `<div style="font-size:0.78rem;color:var(--text-dim);padding:8px 0">暂无内容</div>`;
    } else {
      for (const item of top2) {
        const quote = item.quote || '';
        const url = item.url || '';
        const hasUrl = url && url !== '#';
        const escUrl = url.replace(/"/g, '&quot;');
        html += `<article class="card-compact" data-url="${escUrl}" onclick="var u=this.dataset.url;if(u)window.open(u,'_blank','noopener')">
          <div class="card-compact-title">${escHtml(item.title || '无标题')}</div>
          ${quote ? `<div class="card-compact-quote"><span>💬</span><span>${escHtml(quote)}</span></div>` : `<div class="card-compact-quote" style="color:var(--text-dim);font-style:normal"><span>📄</span><span>${escHtml((item.content || '').slice(0, 80))}${(item.content || '').length > 80 ? '...' : ''}</span></div>`}
        </article>`;
      }
    }
    html += `</div>`;
  }

  container.innerHTML = html;
}

/* ========== Back to Top ========== */
(function initBackToTop() {
  const btn = document.getElementById('backToTop');
  if (!btn) return;
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        if (window.scrollY > 300) {
          btn.classList.add('visible');
        } else {
          btn.classList.remove('visible');
        }
        ticking = false;
      });
      ticking = true;
    }
  });
  btn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();

/* ========== Mobile Nav Toggle ========== */
(function initNavToggle() {
  const toggle = document.getElementById('navToggle');
  const links = document.getElementById('navLinks');
  if (toggle && links) {
    toggle.addEventListener('click', function(e) {
      e.stopPropagation();
      links.classList.toggle('open');
    });
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.nav-inner')) {
        links.classList.remove('open');
      }
    });
  }
})();

/* ========== Init ========== */
async function init() {
  try {
    allData = await loadData();
    updateTabCounts();

    // Render default tab (summary)
    if (currentTab === 'summary') {
      renderSummary();
    } else {
      renderTab(currentTab);
    }

    $$('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const key = tab.dataset.tab;
        if (key && key !== currentTab) switchTab(key);
      });
    });

  } catch (err) {
    $('main#mainContent').innerHTML = `
      <div class="state-message">
        <div class="state-icon">😵</div>
        <div style="margin-bottom:4px;font-weight:600">数据加载失败</div>
        <div style="font-size:0.82rem;color:var(--text-dim)">${escHtml(err.message)}</div>
        <button class="retry-btn" onclick="window.location.reload()">重试</button>
      </div>`;
  }
}

init();
</script>
