<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 精选助手 | 有数Feed</title>
<style>
/* ========== Reset & Variables ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --bg-card: #13131a;
  --bg-card-hover: #1a1a24;
  --border: #1f1f2e;
  --border-glow: #2a2a3e;
  --text: #c2c2d1;
  --text-dim: #6b6b80;
  --text-bright: #f0f0fa;
  --accent: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.2);
  --green: #22c55e;
  --green-glow: rgba(34, 197, 94, 0.15);
  --blue: #3b82f6;
  --purple: #a855f7;
  --orange: #f59e0b;
  --pink: #ec4899;
  --radius: 14px;
  --radius-sm: 10px;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ========== Base ========== */
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ========== Background Ambient ========== */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(99, 102, 241, 0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(34, 197, 94, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 60%, rgba(168, 85, 247, 0.04) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

/* ========== Layout ========== */
.app-container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 16px 40px; }

/* ========== Header / AI Avatar ========== */
.ai-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10, 10, 15, 0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 10px;
}

.ai-header-inner {
  max-width: 680px; margin: 0 auto;
  display: flex; align-items: center; gap: 12px;
}

.ai-avatar {
  width: 42px; height: 42px; border-radius: 12px;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(99, 102, 241, 0.25);
  position: relative;
}

.ai-avatar::after {
  content: '';
  position: absolute; bottom: -2px; right: -2px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--green);
  border: 2px solid var(--bg);
  box-shadow: 0 0 6px var(--green);
  animation: pulse-dot 2.5s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 4px var(--green); }
  50% { box-shadow: 0 0 10px var(--green), 0 0 18px rgba(34,197,94,0.4); }
}

.ai-header-info { flex: 1; min-width: 0; }
.ai-header-name {
  font-size: 0.95rem; font-weight: 700; color: var(--text-bright);
  letter-spacing: -0.2px;
}
.ai-header-status {
  font-size: 0.72rem; color: var(--text-dim);
  display: flex; align-items: center; gap: 4px;
}

/* ========== Welcome Message ========== */
.welcome-card {
  margin-top: 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  position: relative;
  overflow: hidden;
}

.welcome-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--purple), var(--pink));
}

.welcome-avatar-mini {
  display: inline-flex;
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  align-items: center; justify-content: center;
  font-size: 0.85rem; margin-bottom: 8px;
}

.welcome-text {
  font-size: 0.93rem; color: var(--text);
  line-height: 1.7;
}

.welcome-text strong {
  color: var(--text-bright);
}

.welcome-highlight {
  color: var(--accent);
  font-weight: 600;
}

/* ========== Quick Nav ========== */
.quick-nav {
  display: flex; gap: 8px; margin-top: 16px;
  overflow-x: auto; padding-bottom: 4px;
  scrollbar-width: none;
  -ms-overflow-style: none;
  scroll-behavior: smooth;
}
.quick-nav::-webkit-scrollbar { display: none; }

.nav-chip {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-dim);
  font-size: 0.78rem;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  user-select: none;
}
.nav-chip:hover { border-color: var(--border-glow); color: var(--text); }
.nav-chip.active {
  background: rgba(99, 102, 241, 0.12);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}

/* ========== Category Section ========== */
.category-section { margin-top: 28px; }

.cat-header {
  display: flex; align-items: center; gap: 9px;
  margin-bottom: 14px;
  padding-left: 4px;
}

.cat-icon {
  width: 34px; height: 34px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; flex-shrink: 0;
}

.cat-icon.industry { background: rgba(59, 130, 246, 0.12); }
.cat-icon.dev { background: rgba(34, 197, 94, 0.12); }
.cat-icon.ai { background: rgba(168, 85, 247, 0.12); }
.cat-icon.startup { background: rgba(236, 72, 153, 0.12); }
.cat-icon.design { background: rgba(245, 158, 11, 0.12); }

.cat-label {
  font-size: 0.92rem; font-weight: 700; color: var(--text-bright);
  letter-spacing: -0.2px;
}

.cat-count {
  font-size: 0.72rem; color: var(--text-dim);
  font-weight: 400;
}

.cat-color-line {
  height: 2px; border-radius: 1px; margin-top: 4px;
}
.cat-color-line.industry { background: linear-gradient(90deg, var(--blue), transparent); }
.cat-color-line.dev { background: linear-gradient(90deg, var(--green), transparent); }
.cat-color-line.ai { background: linear-gradient(90deg, var(--purple), transparent); }
.cat-color-line.startup { background: linear-gradient(90deg, var(--pink), transparent); }
.cat-color-line.design { background: linear-gradient(90deg, var(--orange), transparent); }

/* ========== Article Card ========== */
.article-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.article-card:hover {
  border-color: var(--border-glow);
  background: var(--bg-card-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

.article-card:active { transform: scale(0.995); }

.card-title {
  font-size: 0.95rem; font-weight: 700; color: var(--text-bright);
  line-height: 1.45; margin-bottom: 6px;
  letter-spacing: -0.2px;
}

.card-summary {
  font-size: 0.82rem; color: var(--text-dim);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 10px;
}

/* ========== AI Insight (毒舌点评) ========== */
.card-insight {
  background: rgba(99, 102, 241, 0.06);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 9px 12px;
  margin-bottom: 10px;
  font-size: 0.8rem;
  color: var(--text);
  line-height: 1.55;
}

.card-insight-label {
  font-size: 0.68rem; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 3px;
  display: flex; align-items: center; gap: 4px;
}

/* ========== Card Footer ========== */
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
}

.card-source {
  font-size: 0.7rem; color: var(--text-dim);
  display: flex; align-items: center; gap: 4px;
}

.card-action {
  font-size: 0.73rem; color: var(--accent);
  font-weight: 600;
  display: flex; align-items: center; gap: 3px;
  opacity: 0.8;
  transition: var(--transition);
}
.article-card:hover .card-action { opacity: 1; }

/* ========== Back to Top ========== */
.back-to-top {
  position: fixed; bottom: 24px; right: 24px;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 50;
  transition: var(--transition);
  opacity: 0; transform: translateY(10px);
  pointer-events: none;
}
.back-to-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
.back-to-top:hover { border-color: var(--border-glow); color: var(--text); }

/* ========== Detail View ========== */
.detail-view {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.detail-view.open { display: block; }

.detail-container {
  max-width: 680px; margin: 0 auto; padding: 0 16px 40px;
}

/* Back bar */
.detail-back-bar {
  position: sticky; top: 0; z-index: 10;
  background: rgba(10, 10, 15, 0.9);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
}

.detail-back-inner {
  max-width: 680px; margin: 0 auto;
  display: flex; align-items: center; gap: 10px;
}

.detail-back-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  font-size: 0.82rem; cursor: pointer;
  transition: var(--transition);
}
.detail-back-btn:hover { border-color: var(--border-glow); background: var(--bg-card-hover); }

.detail-cat-badge {
  font-size: 0.72rem; color: var(--accent);
  background: rgba(99, 102, 241, 0.1);
  padding: 3px 10px; border-radius: 12px;
  font-weight: 600;
}

/* Detail Content */
.detail-header-block {
  margin-top: 24px;
  padding: 0 4px;
}

.detail-title {
  font-size: 1.3rem; font-weight: 800; color: var(--text-bright);
  line-height: 1.45; letter-spacing: -0.3px;
  margin-bottom: 12px;
}

.detail-meta-row {
  display: flex; align-items: center; gap: 14px;
  font-size: 0.75rem; color: var(--text-dim);
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.detail-source-chip {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 3px 10px; border-radius: 14px;
  font-size: 0.72rem;
}

.detail-body {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  font-size: 0.9rem;
  color: var(--text);
  line-height: 1.8;
  margin-bottom: 16px;
}

.detail-insight-block {
  background: rgba(99, 102, 241, 0.06);
  border: 1px solid rgba(99, 102, 241, 0.15);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
}

.detail-insight-label {
  font-size: 0.72rem; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 5px;
}

.detail-insight-text {
  font-size: 0.88rem; color: var(--text);
  line-height: 1.7;
  font-style: italic;
}

.detail-source-link {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 10px 18px; border-radius: 22px;
  background: var(--accent);
  color: #fff;
  font-size: 0.84rem; font-weight: 600;
  transition: var(--transition);
  margin-top: 4px;
}
.detail-source-link:hover {
  background: #5558e8;
  text-decoration: none;
  box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
}

.detail-url-hint {
  font-size: 0.7rem; color: var(--text-dim);
  margin-top: 10px;
  word-break: break-all;
}

/* ========== States ========== */
.loading-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px 20px;
  color: var(--text-dim);
}

.loading-spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px 20px;
  text-align: center;
}

.error-icon { font-size: 2.5rem; margin-bottom: 12px; }
.error-title { font-size: 1rem; font-weight: 700; color: var(--text-bright); margin-bottom: 6px; }
.error-desc { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 16px; }

.retry-btn {
  padding: 10px 24px; border-radius: 22px;
  border: 1px solid var(--accent);
  background: rgba(99, 102, 241, 0.1);
  color: var(--accent);
  font-size: 0.84rem; font-weight: 600; cursor: pointer;
  transition: var(--transition);
}
.retry-btn:hover { background: rgba(99, 102, 241, 0.2); }

.empty-state {
  text-align: center; padding: 24px 16px;
  color: var(--text-dim); font-size: 0.82rem;
}

/* ========== Footer ========== */
.app-footer {
  text-align: center; padding: 32px 16px 20px;
  font-size: 0.72rem; color: var(--text-dim);
}

/* ========== Responsive ========== */
@media (max-width: 640px) {
  .ai-header-inner { padding: 0; }
  .app-container { padding: 0 12px 32px; }
  .article-card { padding: 16px 16px; }
  .card-title { font-size: 0.9rem; }
  .detail-body { padding: 16px 16px; }
  .detail-title { font-size: 1.15rem; }
  .back-to-top { bottom: 16px; right: 16px; }
}

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-glow); }
</style>
</head>
<body>

<!-- ===== AI Header ===== -->
<header class="ai-header" id="aiHeader">
  <div class="ai-header-inner">
    <div class="ai-avatar">🧠</div>

<script>
/* ========== Constants ========== */
const CDN_BASE = 'https://lucian-tang.github.io/dushe-daily-data';
const CATEGORIES = ['industry', 'dev', 'ai', 'startup', 'design'];

const CAT_META = {
  industry: { label: '行业动态', emoji: '🔵', color: 'industry', cn: '行业', welcomeLabel: '行业精选' },
  dev:      { label: '开发者', emoji: '🟢', color: 'dev', cn: '开发', welcomeLabel: '开发者精选' },
  ai:       { label: 'AI 前沿', emoji: '🟣', color: 'ai', cn: 'AI', welcomeLabel: 'AI 前沿' },
  startup:  { label: '创业风向', emoji: '🩷', color: 'startup', cn: '创业', welcomeLabel: '创业风向' },
  design:   { label: '设计趋势', emoji: '🟠', color: 'design', cn: '设计', welcomeLabel: '设计趋势' }
};

let allData = {};
let currentDetailUid = null;

/* ========== DOM Helpers ========== */
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

/* ========== Utilities ========== */
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escAttr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00+08:00');
  if (isNaN(d.getTime())) return dateStr;
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

function toDateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}${m}${day}`;
}

/* ========== Data Fetching ========== */
async function fetchJSON(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

async function tryFetchCombined(dateStr) {
  const url = `${CDN_BASE}/combined_3days_${dateStr}.json`;
  try {
    const data = await fetchJSON(url);
    return { data, date: dateStr };
  } catch { return null; }
}

async function loadData() {
  const now = new Date();
  const dates = [toDateKey(now)];
  for (let i = 1; i <= 3; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    dates.push(toDateKey(d));
  }

  for (const d of dates) {
    const result = await tryFetchCombined(d);
    if (result) {
      return result.data;
    }
  }
  throw new Error('暂无数据，请稍后再试');
}

/* ========== Find Item ========== */
function findItemByUid(uid) {
  for (const cat of CATEGORIES) {
    const items = allData[cat] || [];
    for (const item of items) {
      if (item.uid === uid) return { item, category: cat };
    }
  }
  return null;
}

/* ========== Render Feed ========== */
function renderCategorySection(catKey) {
  const items = allData[catKey] || [];
  if (items.length === 0) return '';

  const meta = CAT_META[catKey];
  let html = `<section class="category-section" id="section-${catKey}">`;
  html += `<div class="cat-header">`;
  html += `<div class="cat-icon ${meta.color}">${meta.emoji}</div>`;
  html += `<div class="cat-label">今日${meta.welcomeLabel} <span class="cat-count">· ${items.length} 条</span></div>`;
  html += `</div>`;
  html += `<div class="cat-color-line ${meta.color}"></div>`;

  for (const item of items) {
    html += renderArticleCard(item);
  }

  html += `</section>`;
  return html;
}

function renderArticleCard(item) {
  const title = item.title || '无标题';
  const content = item.content || '';
  const quote = item.quote || '';
  const source = item.source || '未知';
  const uid = item.uid || '';

  return `
    <article class="article-card" data-uid="${escAttr(uid)}" onclick="openDetail('${escAttr(uid)}')" role="button" tabindex="0">
      <div class="card-title">${escHtml(title)}</div>
      ${content ? `<div class="card-summary">${escHtml(content)}</div>` : ''}
      ${quote ? `
      <div class="card-insight">
        <div class="card-insight-label">💡 AI 洞察</div>
        ${escHtml(quote)}
      </div>` : ''}
      <div class="card-footer">
        <span class="card-source">📰 ${escHtml(source)}</span>
        <span class="card-action">深入了解 →</span>
      </div>
    </article>
  `;
}

function renderAll() {
  let html = '';
  for (const cat of CATEGORIES) {
    html += renderCategorySection(cat);
  }
  $('#mainFeed').innerHTML = html || '<div class="empty-state">🤔 暂无内容</div>';
  $('#appFooter').style.display = '';
}

/* ========== Detail View ========== */
function renderDetail(item, category) {
  const meta = CAT_META[category] || { cn: category };
  const title = item.title || '无标题';
  const content = item.content || '（暂无正文）';
  const quote = item.quote || '';
  const source = item.source || '未知来源';
  const url = item.url || '#';
  const published = item.published || '';

  $('#detailTitle').textContent = title;
  $('#detailDate').textContent = published ? formatDate(published) : '日期未知';
  $('#detailSourceTag').textContent = source;
  $('#detailCatBadge').textContent = meta.cn;
  $('#detailBody').textContent = content;

  const insightBlock = $('#detailInsightBlock');
  if (quote) {
    insightBlock.style.display = '';
    $('#detailInsightText').textContent = quote;
  } else {
    insightBlock.style.display = 'none';
  }

  const linkEl = $('#detailSourceLink');
  if (url && url !== '#') {
    linkEl.href = url;
    linkEl.style.display = 'inline-flex';
    let displayUrl = url.replace(/^https?:\/\//, '');
    if (displayUrl.length > 60) displayUrl = displayUrl.slice(0, 60) + '…';
    $('#detailUrlHint').textContent = displayUrl;
  } else {
    linkEl.style.display = 'none';
    $('#detailUrlHint').textContent = '';
  }
}

function openDetail(uid) {
  const result = findItemByUid(uid);
  if (!result) return;

  currentDetailUid = uid;
  const newHash = `#detail/${uid}`;
  if (location.hash !== newHash) {
    history.pushState({ view: 'detail', uid }, '', newHash);
  }
  showDetailView(result.item, result.category);
}

function closeDetail() {
  history.back();
}

function showDetailView(item, category) {
  renderDetail(item, category);
  $('#detailView').classList.add('open');
  $('#detailView').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function hideDetailView() {
  $('#detailView').classList.remove('open');
  document.body.style.overflow = '';
  currentDetailUid = null;
}

/* ========== Navigation ========== */
function scrollToSection(catKey) {
  const el = document.getElementById(`section-${catKey}`);
  if (el) {
    const headerH = $('#aiHeader').offsetHeight;
    const top = el.getBoundingClientRect().top + window.pageYOffset - headerH - 12;
    window.scrollTo({ top, behavior: 'smooth' });
  }
}

function updateActiveNav() {
  const headerH = $('#aiHeader').offsetHeight;
  let activeCat = null;
  const scrollY = window.pageYOffset + headerH + 60;

  for (const cat of CATEGORIES) {
    const el = document.getElementById(`section-${cat}`);
    if (!el) continue;
    const top = el.getBoundingClientRect().top + window.pageYOffset;
    if (top <= scrollY) activeCat = cat;
  }

  $$('.nav-chip').forEach(chip => {
    const isActive = chip.dataset.nav === activeCat;
    chip.classList.toggle('active', isActive);
  });
}

/* ========== Hash Routing ========== */
function handleHash() {
  const hash = location.hash;
  if (!hash) {
    if ($('#detailView').classList.contains('open')) hideDetailView();
    return;
  }

  const detailMatch = hash.match(/^#detail\/(.+)$/);
  if (detailMatch) {
    const uid = detailMatch[1];
    const result = findItemByUid(uid);
    if (result) {
      showDetailView(result.item, result.category);
    } else {
      history.replaceState({ view: 'list' }, '', '#');
      hideDetailView();
    }
    return;
  }

  if ($('#detailView').classList.contains('open')) hideDetailView();
}

window.addEventListener('hashchange', handleHash);
window.addEventListener('popstate', () => {
  if ($('#detailView').classList.contains('open')) hideDetailView();
});

/* ========== Keyboard ========== */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && $('#detailView').classList.contains('open')) {
    closeDetail();
  }
});

/* ========== Back to Top ========== */
function updateBackToTop() {
  const btn = $('#backToTop');
  const show = window.pageYOffset > 500;
  btn.classList.toggle('visible', show);
}

/* ========== Init ========== */
async function init() {
  try {
    allData = await loadData();

    // Update welcome message with total count
    let total = 0;
    for (const cat of CATEGORIES) {
      total += (allData[cat] || []).length;
    }
    $('#welcomeTotal').textContent = `${total} 条精选信息`;

    // Render feed
    renderAll();

    // Set up quick nav
    $$('.nav-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const catKey = chip.dataset.nav;
        if (catKey) scrollToSection(catKey);
      });
    });

    // Scroll tracking
    let scrollTicking = false;
    window.addEventListener('scroll', () => {
      if (!scrollTicking) {
        requestAnimationFrame(() => {
          updateActiveNav();
          updateBackToTop();
          scrollTicking = false;
        });
        scrollTicking = true;
      }
    }, { passive: true });

    // Handle initial hash
    handleHash();

    // Initial scroll check
    updateActiveNav();

  } catch (err) {
    $('#mainFeed').innerHTML = `
      <div class="error-state">
        <div class="error-icon">😵</div>
        <div class="error-title">AI 助手暂时无法连接</div>
        <div class="error-desc">${escHtml(err.message)}</div>
        <button class="retry-btn" onclick="window.location.reload()">🔄 重新连接</button>
      </div>`;
  }
}

init();
</script>
</body>
</html>
